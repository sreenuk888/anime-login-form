<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>anime-login-form</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <div class="form">
            <div class="content">
                <h1>login</h1>
                <div class="group">
                    <input type="text" class="inputText" placeholder="">
                    <label for="">username</label>
                </div>
                    <div class="group">
                    <input type="password" class="inputText" placeholder="">
                    <label for="">password</label>
                </div>
                    <div class="group">
                    <input type="checkbox">
                    <label for="">save me</label>
                </div>
                <button>login</button>
            </div>
        </div>
    </div>
</body>
</html>
